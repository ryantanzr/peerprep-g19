name: Question Service CI

on:
  push:
    paths:
      - "services/question-service/**"
      - ".github/workflows/question-service-ci.yml"
  pull_request:
    paths:
      - "services/question-service/**"
      - ".github/workflows/question-service-ci.yml"
  workflow_dispatch:

jobs:
  test-question-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/question-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/question-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_main.py -v --tb=short
        env:
          MONGO_URL: mongodb://localhost:27017

  release-question-service:
    needs: test-question-service
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/question-service
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/question-service
          file: services/question-service/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/question-service:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/question-service:cache,mode=max
          platforms: linux/amd64,linux/arm64